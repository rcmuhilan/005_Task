<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .login-container {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #333; }
        button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        .firebase-btn {
            background-color: #FFCA28;
            color: #333;
        }
        .firebase-btn:hover { background-color: #ffc107; }
        .firebase-google-btn {
        background-color: #FF7043;
        color: white;
        }
        .firebase-google-btn:hover {
        background-color: #ff4800;
        }
        .firebase-facebook-btn {
        background-color: #1877F2;
        color: white;
        }
        .firebase-facebook-btn:hover {
        background-color: #006aff;
        }
        .muhilan-btn {
            background-color: #673AB7; /* Deep Purple */
            color: white;
        }
        .muhilan-btn:hover {
            background-color: #512DA8;
        }
        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        #firebase-login-form {
            display: none;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        #muhilan-login-form {
            display: none;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .submit-btn {
            background-color: #4CAF50;
            color: white;
        }
        .submit-btn:hover { background-color: #45a049; }
        #status-message {
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Welcome</h2>
    
    <!-- Firebase Login: Facebook -->
     <button class="firebase-facebook-btn" id="firebase-facebook-btn">Sign in with Facebook</button>

     <!-- Firebase Login: Google -->
    <button class="firebase-google-btn" id="firebase-google-btn">Sign in with Google</button>


    <!-- Firebase Login: Toggles the form -->
    <button class="firebase-btn" onclick="toggleFirebaseForm()">Sign in with Firebase</button>

    <!-- Muhilan Login: Toggles the custom backend form -->
    <button class="muhilan-btn" onclick="toggleMuhilanForm()">Sign in with Muhilan</button>

    <div id="muhilan-login-form">
        <form id="muhilanAuthForm">
            <h2>Muhilan</h2>
            <div class="form-group">
                <input type="text" id="m-username" name="username" placeholder="Username" required>
            </div>
       <!--      <div class="form-group">
                <input type="text" id="m-email" name="email" placeholder="Email" required>
            </div> -->
            <div class="form-group">
                <input type="password" id="m-password" name="password" placeholder="Password" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="button" id="btnMuhilanLogin" class="submit-btn">Log In</button>
                <button type="button" id="btnMuhilanRegister" class="submit-btn" style="background-color: #2196F3;">Register</button>
            </div>
        </form>
    </div>

    <div id="firebase-login-form">
        <form id="authForm">
            <h2>Firebase</h2>
            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" name="password" placeholder="Password" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <button type="submit" id="btnLogin" class="submit-btn">Log In</button>
                <button type="button" id="btnRegister" class="submit-btn" style="background-color: #2196F3;">Register</button>
            </div>
        </form>
    </div>
    <div id="status-message"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      FacebookAuthProvider,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


        // --- Firebase Configuration ---
    // NOTE: placeholder values below; replace with your own project's config
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID",
        measurementId: "YOUR_MEASUREMENT_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // firebase facebook logic
    const facebookProvider = new FacebookAuthProvider();

    document.getElementById("firebase-facebook-btn").addEventListener("click", async () => {
    const statusDiv = document.getElementById("status-message");

    try {
        statusDiv.textContent = "Logging in with Facebook...";
        statusDiv.style.color = "#666";

        const result = await signInWithPopup(auth, facebookProvider);

        const token = await result.user.getIdToken();

        statusDiv.textContent = "Token received! Calling backend...";

        const backendResponse = await fetch("/auth/firebase", {
        method: "GET",
        headers: {
            Authorization: "Bearer " + token,
        },
        });

        const backendResult = await backendResponse.text();

        if (backendResponse.ok) {
        document.open();
        document.write(backendResult);
        document.close();
        } else {
        statusDiv.textContent = backendResult;
        statusDiv.style.color = "red";
        }
    } catch (err) {
        statusDiv.textContent = err.message;
        statusDiv.style.color = "red";
    }
    });

    // firebase google logic
    const googleProvider = new GoogleAuthProvider();

    document.getElementById("firebase-google-btn").addEventListener("click", async () => {
    const statusDiv = document.getElementById("status-message");

    try {
      statusDiv.textContent = "Logging in with Google...";
      statusDiv.style.color = "#666";

      const result = await signInWithPopup(auth, googleProvider);

      const token = await result.user.getIdToken();

      statusDiv.textContent = "Token received! Calling backend...";

      const backendResponse = await fetch("/auth/firebase", {
        method: "GET",
        headers: {
          Authorization: "Bearer " + token,
        },
      });

      const backendResult = await backendResponse.text();

      if (backendResponse.ok) {
        document.open();
        document.write(backendResult);
        document.close();
      } else {
        statusDiv.textContent = backendResult;
        statusDiv.style.color = "red";
      }
    } catch (err) {
      statusDiv.textContent = err.message;
      statusDiv.style.color = "red";
    }
  });

    // --- UI Functions ---

    // Expose function to global scope so onclick can find it
    window.toggleFirebaseForm = function() {
        const form = document.getElementById('firebase-login-form');
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }
    
    window.toggleMuhilanForm = function() {
        const form = document.getElementById('muhilan-login-form');
        const fbForm = document.getElementById('firebase-login-form');
        if(fbForm) fbForm.style.display = 'none'; // Close firebase form if open
        form.style.display = form.style.display === 'block' ? 'none' : 'block';
    }

    // Shared backend authentication helper
    async function authenticateWithBackend(user) {
        const statusDiv = document.getElementById('status-message');
        statusDiv.textContent = 'Token received! Calling backend...';
        
        const token = await user.getIdToken();
        
        const backendResponse = await fetch('/auth/firebase', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + token,
            },
        });

        const backendResult = await backendResponse.text();

        if (backendResponse.ok) {
            document.open();
            document.write(backendResult);
            document.close();
        } else {
            statusDiv.textContent = 'Backend Error: ' + backendResult;
            statusDiv.style.color = 'red';
        }
    }

    // Handle Login
    document.getElementById('btnLogin').addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const statusDiv = document.getElementById('status-message');

        statusDiv.textContent = 'Logging in...';
        statusDiv.style.color = '#666';

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            await authenticateWithBackend(userCredential.user);
        } catch (error) {
            const errorMessage = error.code ? `Login Error: ${error.message}` : `Error: ${error.message}`;
            statusDiv.textContent = errorMessage;
            statusDiv.style.color = 'red';
        }
    });

    // Handle Register
    document.getElementById('btnRegister').addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const statusDiv = document.getElementById('status-message');

        statusDiv.textContent = 'Registering...';
        statusDiv.style.color = '#666';

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            await authenticateWithBackend(userCredential.user);
        } catch (error) {
            const errorMessage = error.code ? `Registration Error: ${error.message}` : `Error: ${error.message}`;
            statusDiv.textContent = errorMessage;
            statusDiv.style.color = 'red';
        }
    });

    // --- Muhilan Custom Auth Logic ---

    async function handleMuhilanAuth(endpoint) {
        const username = document.getElementById('m-username').value;
        const password = document.getElementById('m-password').value;
        const statusDiv = document.getElementById('status-message');

        if (!username || !password) {
            statusDiv.textContent = 'Please enter username and password';
            statusDiv.style.color = 'red';
            return;
        }

        statusDiv.textContent = 'Processing...';
        statusDiv.style.color = '#666';

        try {
            const response = await fetch(`/auth/${endpoint}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password })
            });

            const result = await response.json();

            if (response.ok) {
                statusDiv.textContent = `Success: Welcome ${result.name}`;
                statusDiv.style.color = 'green';
                // Optional: Redirect or show user data
                console.log('User:', result);
            } else {
                statusDiv.textContent = `Error: ${result.error || 'Unknown error'}`;
                statusDiv.style.color = 'red';
            }
        } catch (error) {
            statusDiv.textContent = `Network Error: ${error.message}`;
            statusDiv.style.color = 'red';
        }
    }

    document.getElementById('btnMuhilanLogin').addEventListener('click', (e) => {
        e.preventDefault();
        handleMuhilanAuth('login');
    });

    document.getElementById('btnMuhilanRegister').addEventListener('click', (e) => {
        e.preventDefault();
        handleMuhilanAuth('register');
    });
</script>

</body>
</html>
